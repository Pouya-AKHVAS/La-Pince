server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;


    location /api/ {
        proxy_pass http://api:3007/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location / {
        try_files $uri /index.html;
    }

    
    location /assets/ {
        try_files $uri =404;
    }
}
